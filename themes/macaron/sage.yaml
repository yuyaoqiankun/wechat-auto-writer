# ============================================================
# 马卡龙鼠尾草主题 (Macaron Sage)
# ============================================================
# 特点：自然清新的马卡龙鼠尾草色系，柔和低饱和度配色
# 适用：健康、植物、园艺、生活方式类文章
# 风格：自然、清新、宁静、治愈
# ============================================================

name: 马卡龙鼠尾草
description: 自然清新的马卡龙鼠尾草色系，柔和低饱和度，适合健康、植物、园艺类文章
keywords:
  - 健康
  - 植物
  - 园艺
  - 生活
  - 自然
  - 清新
  - 绿色
  - 鼠尾草
  - 宁静
  - 治愈
  - 养生
  - 草本
  - 有机
  - 慢生活
  - 田园

colors:
  primary: "#4ade80"      # 主色调：马卡龙鼠尾草
  accent: "#dcfce7"       # 强调色：浅鼠尾草背景
  text: "#0f172a"         # 主文字：深 slate
  text_light: "#64748b"   # 次要文字：灰蓝色
  background: "#ffffff"   # 背景色：纯白
  blockquote_bg: "#f0fdf4" # 引用块背景：极浅鼠尾草
  code_bg: "#f0fdf4"      # 代码背景：极浅鼠尾草
  table_border: "#bbf7d0" # 表格边框：浅鼠尾草
  table_header_bg: "#dcfce7" # 表头背景：浅鼠尾草

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#0f172a"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#4ade80"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#0f172a"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#0f172a"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#64748b"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #4ade80"
    background: "#f0fdf4"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#0f172a"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#f0fdf4"
    color: "#4ade80"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#f0fdf4"
    color: "#0f172a"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#0f172a"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#4ade80"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#4ade80"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#dcfce7"
    color: "#0f172a"
    border: "1px solid #bbf7d0"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#0f172a"
    border: "1px solid #bbf7d0"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#4ade80"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"
