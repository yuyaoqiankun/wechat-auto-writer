# ============================================================
# 马卡龙玫瑰主题 (Macaron Rose)
# ============================================================
# 特点：浪漫精致的马卡龙玫瑰色系，柔和低饱和度配色
# 适用：情感、浪漫、精致、女性向文章
# 风格：浪漫、精致、优雅、温柔
# ============================================================

name: 马卡龙玫瑰
description: 浪漫精致的马卡龙玫瑰色系，柔和低饱和度，适合情感、浪漫、精致类文章
keywords:
  - 浪漫
  - 爱情
  - 精致
  - 女性
  - 优雅
  - 玫瑰
  - 约会
  - 纪念日
  - 情侣
  - 表白
  - 浪漫风
  - 精致感

colors:
  primary: "#ec4899"      # 主色调：马卡龙玫瑰
  accent: "#fce7f3"       # 强调色：浅玫瑰背景
  text: "#0f172a"         # 主文字：深 slate
  text_light: "#64748b"   # 次要文字：灰蓝色
  background: "#ffffff"   # 背景色：纯白
  blockquote_bg: "#fdf2f8" # 引用块背景：极浅玫瑰
  code_bg: "#fdf2f8"      # 代码背景：极浅玫瑰
  table_border: "#fbcfe8" # 表格边框：浅玫瑰
  table_header_bg: "#fce7f3" # 表头背景：浅玫瑰

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#0f172a"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#ec4899"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#0f172a"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#0f172a"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#64748b"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #ec4899"
    background: "#fdf2f8"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#0f172a"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#fdf2f8"
    color: "#ec4899"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#fdf2f8"
    color: "#0f172a"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#0f172a"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#ec4899"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#ec4899"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#fce7f3"
    color: "#0f172a"
    border: "1px solid #fbcfe8"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#0f172a"
    border: "1px solid #fbcfe8"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#ec4899"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"
