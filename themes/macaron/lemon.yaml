# ============================================================
# 马卡龙柠檬主题 (Macaron Lemon)
# ============================================================
# 特点：明亮愉悦的马卡龙柠檬色系，柔和低饱和度配色
# 适用：财经、商业、励志、成长类文章
# 风格：明亮、积极、活力、专业
# ============================================================

name: 马卡龙柠檬
description: 明亮愉悦的马卡龙柠檬色系，柔和低饱和度，适合财经、商业、励志类文章
keywords:
  - 财经
  - 商业
  - 励志
  - 成长
  - 明亮
  - 积极
  - 黄色
  - 柠檬
  - 活力
  - 投资
  - 理财
  - 创业
  - 职场
  - 成功
  - 正能量

colors:
  primary: "#eab308"      # 主色调：马卡龙柠檬
  accent: "#fef9c3"       # 强调色：浅柠檬背景
  text: "#0f172a"         # 主文字：深 slate
  text_light: "#64748b"   # 次要文字：灰蓝色
  background: "#ffffff"   # 背景色：纯白
  blockquote_bg: "#fefce8" # 引用块背景：极浅柠檬
  code_bg: "#fefce8"      # 代码背景：极浅柠檬
  table_border: "#fde047" # 表格边框：浅柠檬
  table_header_bg: "#fef9c3" # 表头背景：浅柠檬

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#0f172a"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#eab308"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#0f172a"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#0f172a"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#64748b"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #eab308"
    background: "#fefce8"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#0f172a"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#fefce8"
    color: "#eab308"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#fefce8"
    color: "#0f172a"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#0f172a"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#eab308"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#eab308"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#fef9c3"
    color: "#0f172a"
    border: "1px solid #fde047"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#0f172a"
    border: "1px solid #fde047"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#eab308"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"
