# ============================================================
# 马卡龙蜜桃主题 (Macaron Peach)
# ============================================================
# 特点：温暖活力的马卡龙蜜桃色系，柔和低饱和度配色
# 适用：美食、生活、亲子、家居类文章
# 风格：温暖、活力、甜美、亲切
# ============================================================

name: 马卡龙蜜桃
description: 温暖活力的马卡龙蜜桃色系，柔和低饱和度，适合美食、生活、亲子类文章
keywords:
  - 美食
  - 生活
  - 亲子
  - 家居
  - 温暖
  - 活力
  - 橙色
  - 蜜桃
  - 甜美
  - 烘焙
  - 料理
  - 育儿
  - 家庭
  - 温馨
  - 日常

colors:
  primary: "#f97316"      # 主色调：马卡龙蜜桃
  accent: "#ffedd5"       # 强调色：浅蜜桃背景
  text: "#0f172a"         # 主文字：深 slate
  text_light: "#64748b"   # 次要文字：灰蓝色
  background: "#ffffff"   # 背景色：纯白
  blockquote_bg: "#fff7ed" # 引用块背景：极浅蜜桃
  code_bg: "#fff7ed"      # 代码背景：极浅蜜桃
  table_border: "#fed7aa" # 表格边框：浅蜜桃
  table_header_bg: "#ffedd5" # 表头背景：浅蜜桃

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#0f172a"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#f97316"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#0f172a"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#0f172a"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#64748b"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #f97316"
    background: "#fff7ed"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#0f172a"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#fff7ed"
    color: "#f97316"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#fff7ed"
    color: "#0f172a"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#0f172a"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#f97316"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#f97316"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#ffedd5"
    color: "#0f172a"
    border: "1px solid #fed7aa"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#0f172a"
    border: "1px solid #fed7aa"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#f97316"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"
