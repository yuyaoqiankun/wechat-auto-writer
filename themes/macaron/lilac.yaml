# ============================================================
# 马卡龙丁香主题 (Macaron Lilac)
# ============================================================
# 特点：浪漫优雅的马卡龙丁香色系，柔和低饱和度配色
# 适用：时尚、美妆、婚礼、生活方式类文章
# 风格：浪漫、优雅、精致、梦幻
# ============================================================

name: 马卡龙丁香
description: 浪漫优雅的马卡龙丁香色系，柔和低饱和度，适合时尚、美妆、婚礼类文章
keywords:
  - 时尚
  - 美妆
  - 婚礼
  - 生活
  - 浪漫
  - 优雅
  - 紫色
  - 丁香
  - 精致
  - 梦幻
  - 潮流
  - 造型
  - 婚纱
  - 派对
  - 庆典

colors:
  primary: "#d946ef"      # 主色调：马卡龙丁香
  accent: "#fae8ff"       # 强调色：浅丁香背景
  text: "#0f172a"         # 主文字：深 slate
  text_light: "#64748b"   # 次要文字：灰蓝色
  background: "#ffffff"   # 背景色：纯白
  blockquote_bg: "#fdf4ff" # 引用块背景：极浅丁香
  code_bg: "#fdf4ff"      # 代码背景：极浅丁香
  table_border: "#f0abfc" # 表格边框：浅丁香
  table_header_bg: "#fae8ff" # 表头背景：浅丁香

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#0f172a"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#d946ef"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#0f172a"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#0f172a"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#64748b"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #d946ef"
    background: "#fdf4ff"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#0f172a"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#fdf4ff"
    color: "#d946ef"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#fdf4ff"
    color: "#0f172a"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#0f172a"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#d946ef"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#d946ef"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#fae8ff"
    color: "#0f172a"
    border: "1px solid #f0abfc"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#0f172a"
    border: "1px solid #f0abfc"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#d946ef"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"
