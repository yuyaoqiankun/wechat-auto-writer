# ============================================================
# 中国水墨风主题 (Chinese Ink Wash)
# ============================================================
# 特点：黑白灰主调，辅以印章红点缀，留白较多，字体优雅
# 适用：文化、历史、艺术、诗词、传统类文章
# 风格：传统、水墨、极简、优雅、中国风
# ============================================================

name: 中国水墨
description: 传统中国水墨画风格，黑白灰主调，辅以印章红点缀，适合文化、历史、艺术类文章
keywords:
  - 水墨
  - 中国风
  - 传统
  - 历史
  - 文化
  - 艺术
  - 黑白
  - 印章
  - 极简

colors:
  primary: "#1a1a1a"      # 主色调：浓墨
  accent: "#f0ece1"        # 强调色：宣纸底色
  text: "#333333"          # 主文字：深灰墨
  text_light: "#666666"    # 次要文字：淡墨
  background: "#fdfcf8"    # 背景色：宣纸白
  blockquote_bg: "#f5f5f5" # 引用块背景：浅灰
  code_bg: "#f0ece1"       # 代码背景：浅宣纸色
  table_border: "#cccccc"  # 表格边框：灰墨
  table_header_bg: "#e6e6e6" # 表头背景：浅灰墨

styles:
  body:
    font_size: "16px"
    line_height: "1.8"
    letter_spacing: "1px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#333333"
    background_color: "#fdfcf8"
    font_family: "'Noto Serif SC', 'Songti SC', 'SimSun', 'STSong', serif"
  h1:
    font_size: "24px"
    font_weight: "bold"
    margin: "20px 0 15px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#1a1a1a"
    letter_spacing: "2px"
  h2:
    font_size: "20px"
    font_weight: "bold"
    margin: "24px 0 12px 0"
    padding: "5px 16px"
    color: "#1a1a1a"
    border_bottom: "1px solid #1a1a1a"
    text_align: "center"
    letter_spacing: "2px"
  h3:
    font_size: "18px"
    font_weight: "bold"
    margin: "16px 0 8px 0"
    padding: "0 16px"
    color: "#333333"
  h4:
    font_size: "16px"
    font_weight: "bold"
    margin: "12px 0 6px 0"
    padding: "0 16px"
    color: "#666666"
  blockquote:
    font_size: "15px"
    padding: "10px 15px"
    margin: "16px 0"
    border_left: "4px solid #9e2a2b" # 印章红边框
    background: "#f5f5f5"
    border_radius: "2px"
    line_height: "1.8"
    color: "#666666"
  code_inline:
    font_size: "14px"
    padding: "2px 6px"
    border_radius: "2px"
    background: "#f0ece1"
    color: "#9e2a2b"
  code_block:
    font_size: "14px"
    line_height: "1.6"
    margin: "16px 4px"
    padding: "12px"
    border_radius: "4px"
    background: "#f5f5f5"
    color: "#333333"
    border: "1px solid #e0e0e0"
  list:
    font_size: "16px"
    margin: "12px 0"
    padding: "0 16px 0 32px"
    line_height: "1.8"
    color: "#333333"
  separator:
    border_top: "1px solid #1a1a1a"
    margin: "30px auto"
    width: "60%"
  image:
    border_radius: "2px"
    box_shadow: "0 4px 12px rgba(0, 0, 0, 0.1)"
    margin: "16px auto"
  link:
    color: "#9e2a2b"
    text_decoration: "none"
    border_bottom: "1px solid #9e2a2b"
  strong:
    font_weight: "bold"
    color: "#1a1a1a"
  table:
    font_size: "14px"
    border_collapse: "collapse"
    width: "100%"
    margin: "16px 0"
  table_th:
    padding: "10px 12px"
    line_height: "1.6"
    font_weight: "bold"
    background: "#e6e6e6"
    color: "#1a1a1a"
    border: "1px solid #cccccc"
  table_td:
    padding: "10px 12px"
    line_height: "1.6"
    color: "#333333"
    border: "1px solid #cccccc"
  module_title:
    font_size: "20px"
    font_weight: "bold"
    color: "#9e2a2b"
    margin: "24px 0 16px 0"
    padding: "0 16px"
    text_align: "center"
    letter_spacing: "2px"
