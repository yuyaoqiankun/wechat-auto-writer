# ============================================================
# 文颜薄荷主题 (Wenyan Mint)
# ============================================================
# 特点：清新薄荷绿，结构清晰，适合健康、环保、自然类文章
# 适用：健康、环保、自然、清新、植物、生活、运动
# 风格：清新、自然、薄荷、清爽
# 来源：文颜(Wenyan)内置主题移植，灵感来自物理猫-薄荷
# ============================================================

name: 文颜薄荷
description: 清新薄荷绿，结构清晰，适合健康、环保、自然类文章
keywords:
  - 薄荷
  - 绿色
  - 清新
  - 自然
  - 健康
  - 环保
  - 植物
  - 生活
  - 运动
  - 清爽

colors:
  primary: "#10b981"      # 主色调：翠绿
  accent: "#d1fae5"       # 强调色：浅绿背景
  text: "#064e3b"         # 主文字：深绿
  text_light: "#047857"   # 次要文字：中绿
  background: "#ffffff"   # 背景色：纯白
  blockquote_bg: "#ecfdf5" # 引用块背景：极浅绿
  code_bg: "#ecfdf5"      # 代码背景：极浅绿
  table_border: "#a7f3d0" # 表格边框：浅绿
  table_header_bg: "#d1fae5" # 表头背景：浅绿

styles:
  body:
    font_size: "16px"
    line_height: "1.75"
    letter_spacing: "0px"
    padding: "0 16px"
    margin: "0 0 10px 0"
    color: "#064e3b"
    background_color: "#ffffff"
  h1:
    font_size: "24px"
    font_weight: "normal"
    margin: "0 0 8px 0"
    padding: "0 16px"
    text_align: "center"
    color: "#059669"
  h2:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 6px 0"
    padding: "0 16px"
    color: "#064e3b"
  h3:
    font_size: "20.8px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#047857"
  h4:
    font_size: "19.2px"
    font_weight: "bold"
    margin: "0 0 4px 0"
    padding: "0 16px"
    color: "#059669"
  blockquote:
    font_size: "14.4px"
    padding: "8px 10px"
    margin: "16px 0"
    border_left: "4px solid #10b981"
    background: "#ecfdf5"
    border_radius: "0 5px 5px 0"
    line_height: "1.75"
    color: "#065f46"
  code_inline:
    font_size: "12.5px"
    padding: "4px 6px"
    border_radius: "3px"
    background: "#d1fae5"
    color: "#047857"
  code_block:
    font_size: "14px"
    line_height: "2"
    margin: "10px 4px"
    padding: "8px"
    border_radius: "5px"
    background: "#ecfdf5"
    color: "#064e3b"
  list:
    font_size: "16px"
    margin: "10px 0"
    padding: "0 16px 0 32px"
    line_height: "1.75"
    color: "#064e3b"
  separator:
    border_top: "1px solid #ddd"
    margin: "20px auto"
  image:
    border_radius: "8px"
    box_shadow: "0 2px 8px rgba(0, 0, 0, 0.08)"
  link:
    color: "#059669"
    text_decoration: "underline"
  strong:
    font_weight: "bold"
    color: "#047857"
  table:
    font_size: "12px"
    border_collapse: "collapse"
    width: "100%"
    margin: "10px 0"
  table_th:
    padding: "9px 12px"
    line_height: "22px"
    font_weight: "bold"
    background: "#d1fae5"
    color: "#064e3b"
    border: "1px solid #a7f3d0"
  table_td:
    padding: "9px 12px"
    line_height: "22px"
    color: "#065f46"
    border: "1px solid #a7f3d0"
  module_title:
    font_size: "20.8px"
    font_weight: "bold"
    color: "#059669"
    margin: "0 0 6px 0"
    padding: "0 16px"
    text_align: "center"